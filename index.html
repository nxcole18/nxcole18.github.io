<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nicole Lu</title>

  <!-- Placeholder handwriting font — swap for your own fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Full-page sky background -->
  <div class="page-bg" aria-hidden="true"></div>

  <!-- Navigation -->
  <nav class="navbar" aria-label="Main navigation">
    <a href="index.html" class="nav-logo-link" aria-label="Home">
      <img src="assets/logo.png" alt="Nicole Lu logo" class="nav-logo" />
    </a>
    <ul class="nav-links" role="list">
      <li><a href="about.html"     class="nav-link">about</a></li>
      <li><a href="projects.html"  class="nav-link">projects</a></li>
      <li><a href="creations.html" class="nav-link">creations</a></li>
      <li><a href="contact.html"   class="nav-link">contact</a></li>
    </ul>
  </nav>

  <!-- Earbuds music button (top-right) -->
  <button class="earbuds-btn" id="earbuds-btn"
          aria-label="Open music player" aria-expanded="false">
    <img src="assets/earbuds.png" alt="Open music player" class="earbuds-img" />
  </button>

  <!-- Spotify popup -->
  <div class="spotify-popup" id="spotify-popup"
       role="dialog" aria-label="Spotify Music Player" aria-hidden="true">
    <button class="spotify-close" id="spotify-close" aria-label="Close music player">×</button>
    <!--
      🎵 Replace the playlist ID in the src URL below with your own Spotify playlist.
         To find your playlist ID: open the playlist on Spotify → Share → Copy link
         URL format: https://open.spotify.com/playlist/YOUR_ID_HERE
         Then embed URL: https://open.spotify.com/embed/playlist/YOUR_ID_HERE?utm_source=generator
         
    -->
    <iframe
      src="https://open.spotify.com/embed/playlist/1IgZZgn37JxftD3MLKK0Ry?utm_source=generator&si=4cc5adc45f87470b"
      width="350"
      height="350"
      frameborder="0"
      allowtransparency="true"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy"
      title="Spotify Music Player">
    </iframe>
  </div>

  <!-- Hero section -->
  <main class="hero" aria-label="Hero">

    <!-- Large cursive name — left side -->
    <div class="hero-name">
      <img src="assets/nicole-lu.png" alt="Nicole Lu" class="name-img" />
    </div>

    <!-- Scrap-paper note card — center-right -->
    <div class="scrap-card" aria-label="About me highlights">
      <img src="assets/scrap-paper.png" alt="Scrap paper note" class="scrap-img" />

      <!-- Text written on the grid paper -->
      <div class="scrap-text">
        <ul>
          <li>bcom in cs &amp; business</li>
          <li>passionate about <span class="text-underline">creating</span>,
              tinkering, art, &amp; learning</li>
          <li><span class="text-underline">swe</span> with design &amp; data
              experience</li>
        </ul>
      </div>
    </div>

  </main>

  <!-- Decorative flowers — bottom-right -->
  <div class="flowers-decor" aria-hidden="true">
    <img src="assets/yellow-flowers.png" alt="" class="flowers-img" />
  </div>

  <!-- Movie-caption typewriter bar -->
  <div class="caption-bar" aria-live="polite">
    <p class="caption-text" id="caption-text"></p>
  </div>

  <script src="main.js"></script>
</body>
</html>
